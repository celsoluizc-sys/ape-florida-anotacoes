<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anotações do Layout — Apto Florida</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #e8e8e8;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Top bar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: #1a1a2e;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    #topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: .5px; flex: 1; }
    #topbar .layout-switcher { display: flex; gap: 6px; }
    .layout-btn {
      padding: 5px 14px;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 20px;
      background: transparent;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
    }
    .layout-btn.active, .layout-btn:hover { background: rgba(255,255,255,.2); border-color: white; }
    #export-btn {
      padding: 6px 16px;
      background: #e63946;
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    #export-btn:hover { background: #c1121f; }

    /* ── Main layout ── */
    #app {
      display: flex;
      height: 100vh;
      padding-top: 52px;
    }

    /* ── Floor plan area ── */
    #floor-plan-area {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      background: #d0d0d0;
    }

    #floor-plan-container {
      position: relative;
      display: inline-block;
      cursor: crosshair;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
      flex-shrink: 0;
    }

    #floor-plan-img {
      display: block;
      max-width: 100%;
      user-select: none;
      border-radius: 4px;
    }

    /* ── Pins on image ── */
    .pin {
      position: absolute;
      width: 30px;
      height: 30px;
      background: #e63946;
      border: 2.5px solid white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 12px;
      transform: translate(-50%, -50%);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.45);
      z-index: 20;
      transition: transform .15s, box-shadow .15s;
    }
    .pin:hover {
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 3px 12px rgba(0,0,0,.55);
    }
    .pin.highlight {
      background: #f4a261;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(244,162,97,.7); }
      50%       { box-shadow: 0 0 0 8px rgba(244,162,97,0); }
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 360px;
      background: #fafafa;
      border-left: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px;
      background: #1a1a2e;
      color: white;
      flex-shrink: 0;
    }
    #sidebar-header h2 { font-size: 13px; font-weight: 600; }
    #sidebar-header p  { font-size: 11px; opacity: .65; margin-top: 3px; }

    #annotations-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    #no-annotations {
      text-align: center;
      color: #aaa;
      padding: 48px 16px;
      font-size: 13px;
      line-height: 1.7;
    }
    #no-annotations .icon { font-size: 36px; margin-bottom: 10px; }

    /* ── Annotation card ── */
    .annotation-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 12px 10px;
      margin-bottom: 10px;
      position: relative;
      transition: box-shadow .2s, border-color .2s;
    }
    .annotation-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.1); border-color: #bbb; }
    .annotation-card.highlight { border-color: #e63946; box-shadow: 0 0 0 2px rgba(230,57,70,.2); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin-bottom: 8px;
    }

    .card-num {
      width: 22px; height: 22px;
      background: #e63946;
      border-radius: 50%;
      color: white;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .card-text {
      font-size: 13px;
      line-height: 1.5;
      color: #222;
      word-break: break-word;
      flex: 1;
    }

    .card-image-wrap {
      margin-top: 8px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
      position: relative;
    }
    .card-image-wrap img {
      width: 100%;
      display: block;
      max-height: 220px;
      object-fit: contain;
      background: #f5f5f5;
    }
    .card-image-label {
      position: absolute;
      top: 6px; left: 6px;
      background: rgba(0,0,0,.55);
      color: white;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .card-type-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: #f0f4ff;
      color: #4a70c4;
      font-weight: 600;
    }
    .card-type-badge.image-badge { background: #fff0f0; color: #c44a4a; }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 17px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color .2s;
    }
    .delete-btn:hover { color: #e63946; background: #fff0f0; }

    /* ── SVG arrows overlay ── */
    #arrows-svg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.active { display: flex; }

    #modal {
      background: white;
      border-radius: 14px;
      padding: 26px 24px 20px;
      width: 460px;
      max-width: 92vw;
      box-shadow: 0 8px 40px rgba(0,0,0,.3);
      animation: modal-in .2s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    #modal h3 { font-size: 16px; color: #1a1a2e; margin-bottom: 16px; }

    #annotation-text {
      width: 100%;
      min-height: 90px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
      margin-bottom: 14px;
    }
    #annotation-text:focus { border-color: #4a70c4; }

    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 16px;
      color: #888;
      font-size: 13px;
    }
    .upload-area:hover { border-color: #4a70c4; background: #f5f7ff; }
    .upload-area.has-file { border-color: #28a745; background: #f0fff4; color: #1a7a3e; }
    .upload-area .upload-icon { font-size: 24px; margin-bottom: 6px; }

    #image-preview {
      display: none;
      max-height: 130px;
      max-width: 100%;
      border-radius: 6px;
      margin-top: 8px;
      object-fit: contain;
    }

    #modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn {
      padding: 9px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #1a1a2e; color: white; }
    .btn-primary:hover { background: #2d2d5e; }
    .btn-secondary { background: #e9ecef; color: #444; }
    .btn-secondary:hover { background: #dee2e6; }
    .btn-danger { background: #fff0f0; color: #e63946; }

    /* ── Tooltip on hover ── */
    .pin-tooltip {
      position: absolute;
      background: rgba(26,26,46,.9);
      color: white;
      font-size: 11px;
      padding: 4px 9px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      transform: translate(-50%, -130%);
      z-index: 50;
    }

    /* ── Scrollbar ── */
    #annotations-list::-webkit-scrollbar { width: 5px; }
    #annotations-list::-webkit-scrollbar-track { background: transparent; }
    #annotations-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  </style>
</head>
<body>

<!-- SVG for arrows -->
<svg id="arrows-svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e63946"/>
    </marker>
    <marker id="arrowhead-hover" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f4a261"/>
    </marker>
  </defs>
</svg>

<!-- Top Bar -->
<div id="topbar">
  <h1>🏠 Anotações do Layout — Apto Florida</h1>
  <div class="layout-switcher">
    <button class="layout-btn active" onclick="switchLayout(1, this)">Layout 1</button>
    <button class="layout-btn" onclick="switchLayout(2, this)">Layout 2</button>
    <button class="layout-btn" onclick="switchLayout(3, this)">Layout 3</button>
  </div>
  <button id="export-btn" onclick="exportAnnotations()">⬇ Exportar JSON</button>
</div>

<!-- App -->
<div id="app">
  <div id="floor-plan-area">
    <div id="floor-plan-container">
      <img id="floor-plan-img" src="layout1.png" alt="Layout do Apartamento" draggable="false">
      <!-- Pins rendered here via JS -->
    </div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Anotações</h2>
      <p>Clique em qualquer ponto do layout para anotar</p>
    </div>
    <div id="annotations-list">
      <div id="no-annotations">
        <div class="icon">📍</div>
        <p>Nenhuma anotação ainda.</p>
        <p>Clique em qualquer ponto<br>do layout para começar.</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h3>📝 Nova Anotação</h3>
    <textarea id="annotation-text" placeholder="Descreva o que deseja modificar neste ponto..."></textarea>

    <div class="upload-area" id="upload-area">
      <div class="upload-icon">🖼️</div>
      <p>Clique para adicionar uma imagem de referência</p>
      <p style="font-size:11px;margin-top:4px;opacity:.6">(opcional)</p>
      <img id="image-preview" alt="Preview">
      <input type="file" id="image-input" accept="image/*" style="display:none">
    </div>

    <div id="modal-buttons">
      <button class="btn btn-secondary" id="cancel-btn">Cancelar</button>
      <button class="btn btn-primary" id="save-btn">Salvar Anotação</button>
    </div>
  </div>
</div>

<script>
  const state = {
    annotations: [],
    counter: 0,
    pending: null,      // { xPct, yPct } relative to image
    selectedFile: null,
    selectedDataUrl: null
  };

  const fpContainer = document.getElementById('floor-plan-container');
  const fpImg       = document.getElementById('floor-plan-img');
  const list        = document.getElementById('annotations-list');
  const noAnn       = document.getElementById('no-annotations');
  const overlay     = document.getElementById('modal-overlay');
  const textarea    = document.getElementById('annotation-text');
  const uploadArea  = document.getElementById('upload-area');
  const fileInput   = document.getElementById('image-input');
  const preview     = document.getElementById('image-preview');
  const arrowsSvg   = document.getElementById('arrows-svg');

  /* ──────────────────────────────────────────── */
  /*  Click on floor plan                         */
  /* ──────────────────────────────────────────── */
  fpContainer.addEventListener('click', (e) => {
    if (e.target.classList.contains('pin')) return;
    const rect = fpImg.getBoundingClientRect();
    const xPct = (e.clientX - rect.left) / rect.width  * 100;
    const yPct = (e.clientY - rect.top)  / rect.height * 100;
    state.pending = { xPct, yPct };
    openModal();
  });

  /* ──────────────────────────────────────────── */
  /*  Modal helpers                               */
  /* ──────────────────────────────────────────── */
  function openModal() {
    textarea.value = '';
    state.selectedFile    = null;
    state.selectedDataUrl = null;
    preview.style.display = 'none';
    uploadArea.classList.remove('has-file');
    uploadArea.querySelector('p').textContent = 'Clique para adicionar uma imagem de referência';
    overlay.classList.add('active');
    setTimeout(() => textarea.focus(), 50);
  }

  function closeModal() {
    overlay.classList.remove('active');
    state.pending = null;
  }

  document.getElementById('cancel-btn').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

  /* Upload area */
  uploadArea.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      state.selectedDataUrl = ev.target.result;
      state.selectedFile    = file;
      preview.src           = ev.target.result;
      preview.style.display = 'block';
      uploadArea.classList.add('has-file');
      uploadArea.querySelector('p').textContent = `✓ ${file.name}`;
    };
    reader.readAsDataURL(file);
  });

  /* Drag-and-drop on upload area */
  uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('has-file'); });
  uploadArea.addEventListener('dragleave', () => { if (!state.selectedFile) uploadArea.classList.remove('has-file'); });
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      fileInput.files = e.dataTransfer.files;
      fileInput.dispatchEvent(new Event('change'));
    }
  });

  /* Save annotation */
  document.getElementById('save-btn').addEventListener('click', () => {
    const text = textarea.value.trim();
    if (!text && !state.selectedDataUrl) {
      textarea.style.borderColor = '#e63946';
      setTimeout(() => textarea.style.borderColor = '', 1200);
      return;
    }
    if (!state.pending) return;

    state.counter++;
    const ann = {
      id:       state.counter,
      xPct:     state.pending.xPct,
      yPct:     state.pending.yPct,
      text:     text,
      imageUrl: state.selectedDataUrl || null
    };
    state.annotations.push(ann);
    renderPin(ann);
    renderCard(ann);
    closeModal();
    drawArrows();

    // scroll sidebar to bottom
    list.scrollTop = list.scrollHeight;
  });

  /* ──────────────────────────────────────────── */
  /*  Render pin on image                         */
  /* ──────────────────────────────────────────── */
  function renderPin(ann) {
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.dataset.id = ann.id;
    pin.textContent = ann.id;
    pin.style.left = ann.xPct + '%';
    pin.style.top  = ann.yPct + '%';

    pin.addEventListener('mouseenter', () => highlightAnnotation(ann.id, true));
    pin.addEventListener('mouseleave', () => highlightAnnotation(ann.id, false));
    pin.addEventListener('click', (e) => {
      e.stopPropagation();
      scrollToCard(ann.id);
    });

    fpContainer.appendChild(pin);
  }

  /* ──────────────────────────────────────────── */
  /*  Render card in sidebar                      */
  /* ──────────────────────────────────────────── */
  function renderCard(ann) {
    if (noAnn.style.display !== 'none' || !noAnn.hidden) {
      noAnn.style.display = 'none';
    }

    const card = document.createElement('div');
    card.className = 'annotation-card';
    card.dataset.id = ann.id;
    card.id = `card-${ann.id}`;

    const hasImage = !!ann.imageUrl;

    card.innerHTML = `
      <div class="card-header">
        <div class="card-num">${ann.id}</div>
        <div class="card-text">${ann.text ? escapeHtml(ann.text) : '<em style="color:#aaa">Apenas imagem</em>'}</div>
      </div>
      ${hasImage ? `
      <div class="card-image-wrap">
        <img src="${ann.imageUrl}" alt="Referência ${ann.id}">
        <span class="card-image-label">Referência</span>
      </div>` : ''}
      <div class="card-footer">
        <span class="card-type-badge ${hasImage ? 'image-badge' : ''}">${hasImage ? '🖼 Texto + Imagem' : '💬 Texto'}</span>
        <button class="delete-btn" title="Remover anotação" data-id="${ann.id}">✕</button>
      </div>
    `;

    card.querySelector('.delete-btn').addEventListener('click', () => removeAnnotation(ann.id));
    card.addEventListener('mouseenter', () => highlightAnnotation(ann.id, true));
    card.addEventListener('mouseleave', () => highlightAnnotation(ann.id, false));

    list.appendChild(card);
  }

  /* ──────────────────────────────────────────── */
  /*  Remove annotation                           */
  /* ──────────────────────────────────────────── */
  function removeAnnotation(id) {
    state.annotations = state.annotations.filter(a => a.id !== id);

    const pin  = fpContainer.querySelector(`.pin[data-id="${id}"]`);
    const card = document.getElementById(`card-${id}`);
    if (pin)  pin.remove();
    if (card) card.remove();

    if (state.annotations.length === 0) noAnn.style.display = '';
    drawArrows();
  }

  /* ──────────────────────────────────────────── */
  /*  Highlight matching pin + card               */
  /* ──────────────────────────────────────────── */
  function highlightAnnotation(id, on) {
    const pin  = fpContainer.querySelector(`.pin[data-id="${id}"]`);
    const card = document.getElementById(`card-${id}`);
    const arrow = document.getElementById(`arrow-${id}`);

    if (pin)   pin.classList.toggle('highlight', on);
    if (card)  card.classList.toggle('highlight', on);
    if (arrow) {
      arrow.setAttribute('stroke', on ? '#f4a261' : '#e63946');
      arrow.setAttribute('marker-end', on ? 'url(#arrowhead-hover)' : 'url(#arrowhead)');
      arrow.setAttribute('stroke-width', on ? '2.5' : '2');
    }
  }

  function scrollToCard(id) {
    const card = document.getElementById(`card-${id}`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  /* ──────────────────────────────────────────── */
  /*  Draw SVG arrows: pin center → card center   */
  /* ──────────────────────────────────────────── */
  function drawArrows() {
    // Remove existing arrows
    arrowsSvg.querySelectorAll('line.ann-arrow').forEach(el => el.remove());

    state.annotations.forEach(ann => {
      const pin  = fpContainer.querySelector(`.pin[data-id="${ann.id}"]`);
      const card = document.getElementById(`card-${ann.id}`);
      if (!pin || !card) return;

      const pinRect  = pin.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();

      const x1 = pinRect.left  + pinRect.width  / 2;
      const y1 = pinRect.top   + pinRect.height / 2;
      const x2 = cardRect.left;
      const y2 = cardRect.top  + cardRect.height / 2;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('id',          `arrow-${ann.id}`);
      line.setAttribute('class',       'ann-arrow');
      line.setAttribute('x1',          x1);
      line.setAttribute('y1',          y1);
      line.setAttribute('x2',          x2 - 4);
      line.setAttribute('y2',          y2);
      line.setAttribute('stroke',      '#e63946');
      line.setAttribute('stroke-width','2');
      line.setAttribute('stroke-dasharray', '5 4');
      line.setAttribute('marker-end', 'url(#arrowhead)');
      line.setAttribute('opacity',    '0.75');
      arrowsSvg.appendChild(line);
    });
  }

  /* Redraw arrows on scroll / resize */
  document.getElementById('floor-plan-area').addEventListener('scroll', drawArrows);
  document.getElementById('annotations-list').addEventListener('scroll', drawArrows);
  window.addEventListener('resize', drawArrows);

  /* Redraw when image loads (size might change) */
  fpImg.addEventListener('load', drawArrows);

  /* ──────────────────────────────────────────── */
  /*  Layout switcher                             */
  /* ──────────────────────────────────────────── */
  function switchLayout(num, btn) {
    document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fpImg.src = `layout${num}.png`;
  }

  /* ──────────────────────────────────────────── */
  /*  Export annotations to JSON                  */
  /* ──────────────────────────────────────────── */
  function exportAnnotations() {
    if (state.annotations.length === 0) {
      alert('Nenhuma anotação para exportar.');
      return;
    }
    const data = state.annotations.map(a => ({
      id:       a.id,
      posicao:  { x: a.xPct.toFixed(2) + '%', y: a.yPct.toFixed(2) + '%' },
      texto:    a.text,
      temImagem: !!a.imageUrl
    }));
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'anotacoes_florida.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  /* ──────────────────────────────────────────── */
  /*  Utility                                     */
  /* ──────────────────────────────────────────── */
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
